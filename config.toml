# Spuk configuration.
# Everything here is local and free. No network calls happen unless you
# explicitly enable [post_process] AND set the money-warning flag.

[transcribe]
engine           = "faster-whisper"  # faster-whisper | mlx | whispercpp (faster-whisper is cross-platform; default)
model            = "small"           # smallest multilingual model with good accuracy; bump to "large-v3-turbo" if needed
default_language = "en"              # English first. Switch live from the tray menu or cycle hotkey.
languages        = ["en", "de", "pl"]  # starter set; add any of ~100 Whisper languages from Settings (⚙)
device           = "cpu"             # cross-platform safe default. CTranslate2 has no Metal backend on macOS.
compute_type     = "int8"            # fast, small footprint; good on modest hardware (parents' PCs)
vad_filter       = true              # trim leading/trailing silence
beam_size        = 1                 # greedy = lowest latency. Raise to 5 for accuracy (Phase 2).

# These keys can also be changed in the app: Settings (⚙) → Hotkeys → Change.
# Saved choices (settings.json) override the values below.
[hotkey]
# push_to_talk: hold to record, release to transcribe+paste (recommended default).
# toggle: press once to start, press again to stop.
mode        = "push_to_talk"
key         = "<ctrl>+<alt>"           # Ctrl+Option (macOS), Strg+Alt (Windows), Ctrl+Alt (Linux). Hold both to talk.
# Linux: the hotkey is read via evdev (needs the 'input' group) and works on both X11 and Wayland.
cycle_language = "<ctrl>+<shift>+l"    # cycle English -> German -> Polish (kept off Ctrl+Alt to avoid triggering record)
handsfree          = true              # double-tap the hotkey to record hands-free; press once more to stop + transcribe
double_tap_seconds = 0.4               # how quick the double-tap must be (also the tap-vs-hold cutoff)
paste_key   = ""                       # shortcut Spuk SENDS to paste. "" = OS default (Cmd+V / Ctrl+V).
                                       # Set "<ctrl>+<shift>+v" for terminals (VS Code / Cursor). Also in Settings → Hotkeys.

[audio]
samplerate  = 16000                # Whisper's native rate — capture here to avoid resampling
channels    = 1
min_seconds = 0.3                  # ignore taps shorter than this (accidental key bumps)

[post_process]
# OPTIONAL, PAID, OFF BY DEFAULT. The core dictation loop never needs this.
enabled                       = false
i_understand_this_costs_money = false   # second safety latch — both must be true to ever call the API
provider                      = "claude"
max_calls_per_day             = 50      # hard cap, fails closed

[screenshot]
# macOS only. Press BOTH Command keys (left + right, nothing else) to screenshot
# the window you're in, copy it to the clipboard, and paste it into the focused
# field. Fully local — nothing is uploaded.
enabled = true
gesture = "dual_cmd"   # reserved for future trigger choices

[apple_speech]
# macOS only. Hold the Fn (Globe) key to dictate with Apple's on-device engine.
# Words appear live as you speak; release Fn to finalise. Fully local — no network.
# Note: set System Settings → Keyboard → "Press Globe key to: Do Nothing" so macOS
# doesn't open its own dictation popup when you press Fn.
enabled = true
