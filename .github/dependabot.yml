version: 2
updates:
  # Python dependencies (pyproject.toml). Minor + patch bumps are batched into a
  # single grouped PR to keep noise down; majors come as individual PRs.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions versions used in .github/workflows/*.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
