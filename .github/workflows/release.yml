name: Release Spuk

# Cut a release by pushing a tag like v0.1.0, or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed for the release job to create/upload a GitHub Release

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create Python 3.11 environment
        # Runner disks are normal APFS (not exFAT), so no UV_LINK_MODE=copy needed,
        # and the .app's Qt framework symlinks build correctly here.
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv sync

      - name: Build Spuk.app with PyInstaller
        run: |
          uv run --with pyinstaller pyinstaller \
            --clean --noconfirm --workpath build/pyi --distpath dist \
            packaging/spuk.spec

      - name: Sanity check the bundle exists
        run: |
          test -d "dist/Spuk.app" || { echo "Spuk.app not produced"; exit 1; }
          echo "Built bundle:"; du -sh dist/Spuk.app || true

      - name: Sign the .app (stable self-signed cert if present, else ad-hoc)
        # A STABLE code-signing identity gives the bundle a constant Designated
        # Requirement ("certificate leaf = …"), so macOS keeps the user's
        # Accessibility / Input Monitoring / Microphone grants across EVERY update
        # instead of resetting them on each rebuild (the pain of ad-hoc signing).
        # The self-signed cert lives in repo secrets; without it we fall back to
        # ad-hoc so a release never fails. Still unsigned to Gatekeeper either way
        # (self-signed isn't Apple-notarised) — first launch is right-click → Open.
        continue-on-error: true
        env:
          SPUK_CERT_P12_BASE64: ${{ secrets.SPUK_CERT_P12_BASE64 }}
          SPUK_CERT_PASSWORD: ${{ secrets.SPUK_CERT_PASSWORD }}
          SPUK_KEYCHAIN_PASSWORD: ${{ secrets.SPUK_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          find dist/Spuk.app -exec xattr -d com.apple.FinderInfo {} \; 2>/dev/null || true
          xattr -cr dist/Spuk.app || true
          if [ -z "${SPUK_CERT_P12_BASE64:-}" ]; then
            echo "No signing cert secret — ad-hoc signing (permissions reset per update)."
            codesign --force --deep --sign - dist/Spuk.app || true
            exit 0
          fi
          CERTDIR="$RUNNER_TEMP/spuk-cert"; mkdir -p "$CERTDIR"
          echo "$SPUK_CERT_P12_BASE64" | base64 --decode > "$CERTDIR/cert.p12"
          KC="$RUNNER_TEMP/spuk-signing.keychain-db"
          security create-keychain -p "$SPUK_KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$SPUK_KEYCHAIN_PASSWORD" "$KC"
          security import "$CERTDIR/cert.p12" -k "$KC" -P "$SPUK_CERT_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$SPUK_KEYCHAIN_PASSWORD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          # Self-signed cert isn't Apple-anchored, so trust it for code signing in
          # the system domain (passwordless sudo on the runner) or codesign refuses.
          openssl pkcs12 -legacy -in "$CERTDIR/cert.p12" -nokeys -clcerts -passin pass:"$SPUK_CERT_PASSWORD" -out "$CERTDIR/cert.pem" 2>/dev/null \
            || openssl pkcs12 -in "$CERTDIR/cert.p12" -nokeys -clcerts -passin pass:"$SPUK_CERT_PASSWORD" -out "$CERTDIR/cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$CERTDIR/cert.pem"
          codesign --force --deep --sign "Spuk Self-Signed" --keychain "$KC" dist/Spuk.app
          echo "Signed. Designated Requirement:"; codesign -d -r- dist/Spuk.app 2>&1 | grep -i designated || true
          codesign -v --strict dist/Spuk.app && echo "signature valid"

      - name: Zip the .app (ditto preserves symlinks + metadata)
        # plain `zip` corrupts a macOS .app bundle (Qt framework symlinks); use ditto.
        # The zip is kept for the in-app self-updater (it downloads + unzips this).
        run: ditto -c -k --sequesterRsrc --keepParent dist/Spuk.app Spuk-macos.zip

      - name: Build drag-to-Applications DMG
        # A proper Mac installer: open the .dmg, drag Spuk onto Applications. Uses
        # the Aurora background in packaging/. Falls back to a plain (background-less)
        # DMG if create-dmg's Finder scripting hiccups on the runner, so the release
        # always ships a working installer.
        run: |
          brew install create-dmg
          mkdir -p dmg-src
          ditto dist/Spuk.app dmg-src/Spuk.app
          create-dmg \
            --volname "Spuk" \
            --background packaging/dmg-background.png \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Spuk.app" 150 185 \
            --hide-extension "Spuk.app" \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "Spuk-macos.dmg" \
            "dmg-src" \
          || {
            echo "create-dmg failed — building a plain DMG with hdiutil"
            rm -f Spuk-macos.dmg
            ln -s /Applications dmg-src/Applications
            hdiutil create -volname "Spuk" -srcfolder dmg-src -ov -format UDZO Spuk-macos.dmg
          }
          test -f Spuk-macos.dmg || { echo "No DMG produced"; exit 1; }
          echo "Built DMG:"; du -sh Spuk-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: Spuk-macos
          path: |
            Spuk-macos.zip
            Spuk-macos.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows (folder + .exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create Python 3.11 environment
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv sync

      - name: Build Spuk.exe with PyInstaller
        # On Windows the spec's BUNDLE step is a no-op; PyInstaller emits the
        # COLLECT one-folder build at dist\Spuk\ containing Spuk.exe.
        run: |
          uv run --with pyinstaller pyinstaller `
            --clean --noconfirm --workpath build\pyi --distpath dist `
            packaging\spuk.spec

      - name: Sanity check the build exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Spuk\Spuk.exe")) {
            Write-Error "dist\Spuk\Spuk.exe not produced"; exit 1
          }
          Write-Host "Built folder:"
          Get-ChildItem dist\Spuk | Select-Object Name, Length | Out-String | Write-Host

      - name: Zip the Spuk folder
        shell: pwsh
        run: Compress-Archive -Path dist\Spuk -DestinationPath Spuk-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Spuk-windows
          path: Spuk-windows.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux (.deb / .rpm / tarball)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build tooling (fpm + rpm + compiler for evdev)
        # fpm (Ruby) builds the .deb/.rpm; rpm provides rpmbuild so the .rpm is
        # emitted; build-essential + linux-libc-dev let the Linux-only `evdev`
        # dependency compile during `uv sync` (it needs <linux/input.h>).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ruby ruby-dev build-essential rpm linux-libc-dev
          sudo gem install --no-document fpm

      - name: Create Python 3.11 environment
        run: uv venv --python 3.11 .venv

      - name: Install dependencies (includes Linux-only evdev)
        run: uv sync

      - name: Build Linux packages (.deb / .rpm / tarball)
        # build_linux.sh runs PyInstaller (via `uv run --with pyinstaller`) then
        # fpm. PyInstaller is not a cross-compiler, so this is the ONLY place the
        # real Linux bundle + packages get built.
        run: bash packaging/build_linux.sh

      - name: Sanity check artifacts exist
        run: |
          test -n "$(ls dist/*.deb 2>/dev/null)"     || { echo 'no .deb produced';     exit 1; }
          test -n "$(ls dist/*.rpm 2>/dev/null)"     || { echo 'no .rpm produced';     exit 1; }
          test -n "$(ls dist/*.tar.gz 2>/dev/null)"  || { echo 'no tarball produced';  exit 1; }
          echo 'Linux artifacts:'; du -sh dist/*.deb dist/*.rpm dist/*.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: Spuk-linux
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only publish a Release when triggered by a tag. A manual (workflow_dispatch)
    # run still builds + uploads artifacts above, but won't create a Release.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: Spuk-macos
          path: dist-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: Spuk-windows
          path: dist-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: Spuk-linux
          path: dist-linux

      - name: Create / update the GitHub Release and attach binaries
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist-macos/Spuk-macos.dmg
            dist-macos/Spuk-macos.zip
            dist-windows/Spuk-windows.zip
            dist-linux/*.deb
            dist-linux/*.rpm
            dist-linux/*.tar.gz
          body: |
            ## Spuk — download below 👻

            - **Mac:** `Spuk-macos.dmg` — open it and **drag Spuk into Applications**.
              *(`Spuk-macos.zip` is also here for the in-app updater and power users.)*
            - **Windows:** `Spuk-windows.zip` — extract and run `Spuk.exe`.
            - **Linux:** `spuk_*_amd64.deb` (Debian/Ubuntu/Mint) or `spuk-*.x86_64.rpm`
              (Fedora/openSUSE) — install with `sudo apt install ./spuk_*.deb` /
              `sudo dnf install ./spuk-*.rpm`. A portable `.tar.gz` (run `sudo ./install.sh`)
              is there for any other distro; Arch users see the AUR `PKGBUILD` in the repo.

            See the [README install guide](https://github.com/1mp3ctz/spuk#%EF%B8%8F-download--install)
            for the simple, step-by-step setup.

            > ⚠️ These builds are **unsigned**. macOS: right-click → **Open** the first
            > time. Windows: **More info → Run anyway** the first time. The first launch
            > downloads the speech model (~480 MB) and needs internet once; offline and
            > free after that.
            >
            > 🐧 **Linux one-time setup:** add yourself to the `input` group so the hotkey
            > and paste work — `sudo usermod -aG input "$USER"`, then log out and back in.
            > Install a clipboard helper (`wl-clipboard` on Wayland, `xclip` on X11); the
            > `.deb` pulls one in automatically. Works on both X11 and Wayland.
