[project]
name = "spuk"
version = "0.1.0"
description = "Private, local, free dictation for macOS (Apple Silicon) — a stripped-down Wispr Flow clone."
readme = "README.md"
requires-python = ">=3.11,<3.13"   # 3.13/3.14 lack reliable ctranslate2 wheels in mid-2026
dependencies = [
    "faster-whisper>=1.1,<2",      # CTranslate2 Whisper; bundles PyAV so no ffmpeg binary needed
    "sounddevice>=0.5,<0.6",       # PortAudio mic capture -> raw float32 numpy
    "numpy>=1.26,<3",
    "pynput>=1.7,<2",              # global hotkey + synthetic Cmd+V
    "pyperclip>=1.9,<2",           # clipboard get/set (wraps pbcopy/pbpaste)
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spuk"]
